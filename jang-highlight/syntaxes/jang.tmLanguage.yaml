scopeName: source.jang
name: Jang

patterns:
  - include: '#keywords'
  - include: '#strings'
  - include: '#numbers'

repository:
  keywords:
    patterns:
      - name: keyword.control.jang
        match: '\b(fn|let|ret|if|else|loop|break|type|mut)\b'

  strings:
    patterns:
      - name: string.quoted.double.jang
        begin: '"'
        end: '"'
        patterns:
          - name: constant.character.escape.jang
            match: '\\.'

  numbers:
    patterns:
      - name: constant.numeric.jang
        match: '\b\d+(\.\d+)?\b'
